<!-- Relay SVG Logo - Simple baton/lightning bolt + text mark -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 48" width="180" height="48">
  <defs>
    <linearGradient id="relay-logo-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF9D2E"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#46D3FF"/>
    </linearGradient>
  </defs>
  <!-- Baton/arrow mark -->
  <g transform="translate(0, 4)">
    <rect x="2" y="8" width="28" height="6" rx="3" fill="url(#relay-logo-grad)"/>
    <polygon points="30,4 30,18 42,11" fill="#FF9D2E"/>
    <circle cx="8" cy="11" r="4" fill="#0A0A0F" stroke="#FF9D2E" stroke-width="1.5"/>
    <circle cx="20" cy="11" r="4" fill="#0A0A0F" stroke="#8B5CF6" stroke-width="1.5"/>
    <circle cx="32" cy="11" r="4" fill="#0A0A0F" stroke="#46D3FF" stroke-width="1.5"/>
  </g>
  <!-- Text -->
  <text x="52" y="32" font-family="'Chakra Petch',system-ui,sans-serif" font-weight="700" font-size="26" letter-spacing="3" fill="currentColor">RELAY</text>
  <text x="160" y="32" font-family="'Chakra Petch',system-ui,sans-serif" font-weight="500" font-size="10" letter-spacing="1" fill="#8B5CF6">.co</text>
</svg>
