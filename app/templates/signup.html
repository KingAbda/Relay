{% extends "base.html" %}
{% block title %}Sign Up{% endblock %}
{% block content %}
<div style="display: flex; justify-content: center; padding: 40px 0;">
  <div style="display: flex; flex-direction: column; align-items: center; gap: 24px; padding: 48px 40px; background: var(--panel); border-radius: 20px; width: 420px; box-shadow: var(--shadow-lg); border: 1px solid var(--border-light);">
    <h1 style="font-size: 28px; margin: 0; color: var(--ink);">Join Relay</h1>
    <p style="font-size: 14px; color: var(--muted); margin: 0;">Enter your .edu email to get started. We'll send a verification code.</p>

    {% if error %}
      <div class="form-error" style="text-align: center; padding: 12px; background: rgba(239,68,68,0.08); border-radius: var(--radius-sm); width: 100%;">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/signup" style="display: flex; flex-direction: column; gap: 16px; width: 100%;">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
      <div class="form-group" style="margin: 0;">
        <label>Full Name</label>
        <input type="text" name="full_name" class="form-input" placeholder="e.g. Alex Rivera" required />
      </div>
      <div class="form-group" style="margin: 0;">
        <label>.edu Email</label>
        <input type="email" name="email" class="form-input" placeholder="e.g. ar1234@nyu.edu" required />
      </div>
      <div class="form-group" style="margin: 0;">
        <label>Password</label>
        <input type="password" name="password" class="form-input" placeholder="At least 8 characters, 1 uppercase, 1 number" required />
      </div>
      <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 8px;">Create Account</button>
    </form>

    <p style="font-size: 13px; color: var(--muted); margin: 0;">
      Already have an account? <a href="/login" style="color: var(--primary); font-weight: 500;">Log in</a>
    </p>
  </div>
</div>
{% endblock %}
