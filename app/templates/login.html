{% extends "base.html" %}
{% block title %}Log In{% endblock %}
{% block content %}
<div style="max-width: 400px; margin: 0 auto;">
  <h1 style="text-align: center; margin-bottom: 32px;">Welcome back</h1>

  {% if error %}
    <div class="form-error" style="text-align: center; margin-bottom: 16px; padding: 12px; background: rgba(248, 113, 113, 0.08); border-radius: var(--radius-sm);">{{ error }}</div>
  {% endif %}

  <form method="POST" action="/login">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
    <div class="form-group">
      <label>Email</label>
      <input type="email" name="email" class="form-input" placeholder="ar1234@nyu.edu" required />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" class="form-input" placeholder="••••••" required />
    </div>
    <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">Log in</button>
  </form>

  <p class="muted text-center" style="margin-top: 24px; font-size: 0.85rem;">
    No account yet? <a href="/signup" style="color: var(--amber);">Join Relay</a>
  </p>
</div>
{% endblock %}
