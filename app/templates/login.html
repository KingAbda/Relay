{% extends "base.html" %}
{% block title %}Log In{% endblock %}
{% block content %}
<div style="display: flex; justify-content: center; padding: 40px 0;">
  <div style="display: flex; flex-direction: column; align-items: center; gap: 24px; padding: 48px 40px; background: var(--panel); border-radius: 20px; width: 400px; box-shadow: var(--shadow-lg); border: 1px solid var(--border-light);">
    <h1 style="font-size: 28px; margin: 0; color: var(--ink);">Welcome back</h1>

    {% if error %}
      <div class="form-error" style="text-align: center; padding: 12px; background: rgba(239,68,68,0.08); border-radius: var(--radius-sm); width: 100%;">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/login" style="display: flex; flex-direction: column; gap: 16px; width: 100%;">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
      <div class="form-group" style="margin: 0;">
        <label>Email</label>
        <input type="email" name="email" class="form-input" placeholder="ar1234@nyu.edu" required />
      </div>
      <div class="form-group" style="margin: 0;">
        <label>Password</label>
        <input type="password" name="password" class="form-input" placeholder="••••••" required />
      </div>
      <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">Log in</button>
    </form>

    <p style="font-size: 13px; color: var(--muted); margin: 0;">
      <a href="/forgot-password" style="color: var(--muted);">Forgot password?</a>
    </p>

    <p style="font-size: 13px; color: var(--muted); margin: 0;">
      No account yet? <a href="/signup" style="color: var(--primary); font-weight: 500;">Join Relay</a>
    </p>
  </div>
</div>
{% endblock %}
